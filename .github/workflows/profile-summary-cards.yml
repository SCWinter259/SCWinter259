name: Profile Assets

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/profile-summary-cards.yml
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    name: Generate profile cards and stats snapshots
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: SCWinter259
          BRANCH_NAME: main
          UTC_OFFSET: -6
          EXCLUDE: ""
          AUTO_PUSH: false

      - name: Fetch contribution streak SVG
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p assets

          tmp="$(mktemp)"
          curl --fail --location --silent --show-error --retry 3 --retry-delay 10 \
            "https://streak-stats.demolab.com?user=SCWinter259&theme=github-dark-blue&hide_border=false&date_format=M%20j%5B%2C%20Y%5D" \
            --output "$tmp"

          if ! grep -q "<svg" "$tmp"; then
            echo "Contribution streak did not return an SVG."
            cat "$tmp"
            rm -f "$tmp"
            exit 1
          fi

          if grep -Eiq "Something went wrong|Could not|Cannot|Rate Limit|API rate limit|Maximum retries exceeded" "$tmp"; then
            echo "Contribution streak returned an error SVG."
            cat "$tmp"
            rm -f "$tmp"
            exit 1
          fi

          mv "$tmp" "assets/github-streak.svg"

      - name: Commit changed profile assets
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-streak.svg profile-summary-card-output

          if git diff --cached --quiet; then
            echo "No profile asset changes."
            exit 0
          fi

          git commit -m "Update profile assets [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push
