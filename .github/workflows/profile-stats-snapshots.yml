name: Profile Stats Snapshots

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/profile-stats-snapshots.yml
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats SVGs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p assets

          fetch_svg() {
            local label="$1"
            local url="$2"
            local output="$3"
            local tmp
            tmp="$(mktemp)"

            curl --fail --location --silent --show-error --retry 3 --retry-delay 10 "$url" --output "$tmp"

            if ! grep -q "<svg" "$tmp"; then
              echo "$label did not return an SVG."
              cat "$tmp"
              exit 1
            fi

            if grep -Eiq "Something went wrong|Could not|Cannot|Rate Limit|API rate limit|Maximum retries exceeded" "$tmp"; then
              echo "$label returned an error SVG."
              cat "$tmp"
              exit 1
            fi

            mv "$tmp" "$output"
          }

          fetch_svg \
            "GitHub grade" \
            "https://ghstats.dev/api/card?username=SCWinter259&theme=midnight&hide=stars&hide_border=false" \
            "assets/github-grade.svg"

          fetch_svg \
            "Languages" \
            "https://ghstats.dev/api/langs?username=SCWinter259&theme=midnight&layout=bar&max_langs=8&hide_border=false" \
            "assets/github-languages.svg"

          fetch_svg \
            "Contribution streak" \
            "https://streak-stats.demolab.com?user=SCWinter259&theme=github-dark-blue&hide_border=false&date_format=M%20j%5B%2C%20Y%5D" \
            "assets/github-streak.svg"

      - name: Commit changed snapshots
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-grade.svg assets/github-languages.svg assets/github-streak.svg

          if git diff --cached --quiet; then
            echo "No stats snapshot changes."
            exit 0
          fi

          git commit -m "Update profile stats snapshots [skip ci]"
          git push
